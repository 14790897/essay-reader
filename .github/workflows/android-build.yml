name: Android Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        type: choice
        default: "preview"
        options:
          - preview
          - production

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        run: eas build --platform android --profile ${{ github.event.inputs.profile }} --non-interactive
 
      - name: Download APK
        run: |
          echo "APK will be available at: https://expo.dev/accounts/liuweiqing/projects/essay-reader/builds"

      - uses: actions/upload-artifact@v4
        if: false
        with:
          name: essay-reader-apk
          path: essay-reader.apk
          retention-days: 7
