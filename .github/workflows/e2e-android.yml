name: E2E Android

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "App.tsx"
      - "package.json"
      - ".github/workflows/e2e-android.yml"
      - ".github/e2e-test.sh"

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug --no-daemon

      - name: E2E Tests (adb + uiautomator)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          disable-animations: true
          disable-spellchecker: true
          script: adb wait-for-device && adb install android/app/build/outputs/apk/debug/app-debug.apk && chmod +x .github/e2e-test.sh && ./.github/e2e-test.sh

      - name: Upload E2E artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artifacts
          path: |
            /tmp/e2e-screenshot.png
            /tmp/e2e-logcat.txt
            /tmp/e2e-ui-dump.xml
          retention-days: 3
