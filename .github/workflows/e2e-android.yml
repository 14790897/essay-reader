name: E2E Android

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "App.tsx"
      - "package.json"
      - ".github/workflows/e2e-android.yml"
      - "e2e/**"

jobs:
  e2e-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      - name: Prebuild Android
        run: npx expo prebuild --platform android

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew :app:assembleDebug :app:assembleAndroidTest --no-daemon

      - name: Run Detox E2E Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: default
          arch: x86_64
          profile: pixel_4
          script: npx detox test --configuration android.emu.debug --cleanup
        env:
          DOUBAO_API_KEY: ${{ secrets.DOUBAO_API_KEY }}
          DOUBAO_RESOURCE_ID: ${{ secrets.DOUBAO_RESOURCE_ID }}
