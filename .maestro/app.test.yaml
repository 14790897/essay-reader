appId: com.essayreader.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible: "Essay Reader"
    timeout: 30000

- assertVisible: "System TTS"

# Open article list
- tapOn:
    id: "com.essayreader.app:id/menu-btn"
- assertVisible: "My Articles"
- tapOn: "+ New Article"

# Fill in article
- tapOn:
    text: "Article Title"
- inputText: "E2E Test"
- hideKeyboard
- tapOn:
    text: "Paste or type your article here..."
- inputText: "Hello world for e2e testing."
- hideKeyboard
- tapOn: "Save"
- assertVisible: "E2E Test"

# System TTS
- tapOn: "▶️"
- assertVisible: "Reading..."
- tapOn: "⏮"
- assertVisible: "Ready"

# Switch to Doubao
- tapOn:
    id: "com.essayreader.app:id/settings-btn"
- assertVisible: "Settings"
- tapOn: "Doubao TTS"
- tapOn:
    id: "com.essayreader.app:id/doubao-api-key-input"
- inputText: "${DOUBAO_API_KEY}"
- hideKeyboard
- tapOn: "Done"

# Doubao TTS
- tapOn: "▶️"
- extendedWaitUntil:
    visible: "Reading..."
    timeout: 20000
- tapOn: "⏮"
- assertVisible: "Ready"

# Switch back and clean up
- tapOn:
    id: "com.essayreader.app:id/settings-btn"
- tapOn: "System"
- tapOn: "Done"
- assertVisible: "System TTS"

- tapOn:
    id: "com.essayreader.app:id/menu-btn"
- tapOn: "🗑"
- tapOn: "Delete"
- assertVisible: "No articles yet"
