appId: com.essayreader.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      text: "Essay Reader"
    timeout: 30000

- assertVisible:
    text: "System TTS"

# Open article list via menu button
- tapOn:
    id: "com.essayreader.app:id/menu-btn"

- assertVisible:
    text: "My Articles"

# Create a new article
- tapOn: "+ New Article"

- tapOn:
    text: "Article Title"
- inputText: "E2E Test"
- hideKeyboard

- tapOn:
    text: "Paste or type your article here..."
- inputText: "Hello world for e2e testing."
- hideKeyboard

- tapOn:
    text: "Save"

- assertVisible:
    text: "E2E Test"