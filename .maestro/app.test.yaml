appId: com.essayreader.app
---
- launchApp:
    appId: com.essayreader.app
- extendedWaitUntil:
    visible: "Essay Reader"
    timeout: 30000
- takeScreenshot: /tmp/e2e-screenshot.png

- assertVisible: "System TTS"

- tapOn: "☰"
- assertVisible: "My Articles"
- tapOn: "+ New Article"
- tapOn:
    text: "Article Title"
- inputText: "E2E Test"
- hideKeyboard
- tapOn:
    text: "Paste or type your article here..."
- inputText: "Hello world for e2e testing."
- hideKeyboard
- tapOn: "Save"
- assertVisible: "E2E Test"

- assertVisible: "▶️"
- tapOn: "▶️"
- assertVisible: "Reading..."
- tapOn: "⏮"
- assertVisible: "Ready"

- tapOn: "⚙"
- assertVisible: "Settings"
- tapOn: "Doubao TTS"
- tapOn:
    id: "doubao-api-key-input"
- inputText: "${DOUBAO_API_KEY}"
- hideKeyboard
- tapOn: "Done"

- assertVisible: "Doubao TTS"
- tapOn: "▶️"
- extendedWaitUntil:
    visible: "Reading..."
    timeout: 20000
- tapOn: "⏮"
- assertVisible: "Ready"

- tapOn: "⚙"
- tapOn: "System"
- tapOn: "Done"
- assertVisible: "System TTS"

- tapOn: "☰"
- tapOn: "🗑"
- tapOn: "Delete"
- assertVisible: "No articles yet"
