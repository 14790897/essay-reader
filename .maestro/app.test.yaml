appId: com.essayreader.app
---
- launchApp
- assertVisible: "Essay Reader"
- assertVisible: "System TTS"

# Open article list and create article
- tapOn: "☰"
- assertVisible: "My Articles"
- tapOn: "+ New Article"
- inputText: "E2E Test"
- tapOn:
    text: "Article Title"
- inputText: "E2E Test"
- hideKeyboard
- tapOn:
    text: "Paste or type your article here..."
- inputText: "Hello world for e2e testing."
- hideKeyboard
- tapOn: "Save"
- assertVisible: "E2E Test"

# System TTS playback
- assertVisible: "▶️"
- tapOn: "▶️"
- assertVisible: "Reading..."
- tapOn: "⏮"
- assertVisible: "Ready"

# Settings - switch to Doubao TTS
- tapOn: "⚙"
- assertVisible: "Settings"
- tapOn: "Doubao TTS"
- assertVisible: "Speaker"
- tapOn:
    id: "doubao-api-key-input"
- inputText: "${DOUBAO_API_KEY}"
- hideKeyboard
- tapOn: "Done"

# Doubao TTS playback
- assertVisible: "Doubao TTS"
- tapOn: "▶️"
- extendedWaitUntil:
    visible: "Reading..."
    timeout: 20000
- tapOn: "⏮"
- assertVisible: "Ready"

# Switch back and clean up
- tapOn: "⚙"
- tapOn: "System"
- tapOn: "Done"
- assertVisible: "System TTS"
- tapOn: "☰"
- tapOn: "🗑"
- tapOn: "Delete"
- assertVisible: "No articles yet"
